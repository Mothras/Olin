<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title><3</title>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: '8bit';
            src: url('fonts/8bit.ttf') format('truetype');
        }

        /* ===== RESET & GLOBAL ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }

        body {
            background: url('cute.gif') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            font-family: '8bit', cursive;
            color: white;
            text-shadow: 2px 2px 4px #000;
            padding: 0;
            position: relative;
        }

        /* ===== TITLE BAR (hanya untuk Electron) ===== */
        #custom-title-bar {
            -webkit-app-region: drag;
            height: 35px;
            background-color: #ff9aab;
            color: rgb(255, 220, 220);
            font-size: 1.5em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            font-family: '8bit', cursive;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 9999;
        }

        #window-controls {
            display: flex;
            -webkit-app-region: no-drag;
        }

        #window-controls button {
            background: transparent;
            border: none;
            padding: 5px;
            margin-right: 10px;
            cursor: pointer;
        }

        #window-controls button img {
            width: 20px; height: 20px;
            filter: brightness(0) invert(1);
        }

        #window-controls button:hover img {
            filter: brightness(0.9) invert(1) drop-shadow(0 0 2px white);
        }

        /* Sembunyikan title-bar di non-Electron (HP) */
        body:not(.electron) #custom-title-bar {
            display: none !important;
        }

        /* ===== LYRICS CONTAINER ===== */
        #lyrics {
            font-size: 2.8em;
            text-align: center;
            background: rgb(225 145 145 / 50%);
            padding: 30px;
            border-radius: 15px;
            width: 85%;
            max-width: 900px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        #lyrics #text { width: 100%; }

        .cursor {
            display: inline-block;
            width: 15px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* ===== HALAMAN PEMBUKA "PENCET INI SAYANG" ===== */
        #splash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: opacity 0.8s ease, visibility 0.8s ease;
            -webkit-tap-highlight-color: transparent;
        }

        #splash.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        #splash .splash-heart {
            font-size: 5em;
            animation: pulseHeart 1.5s ease-in-out infinite;
            margin-bottom: 10px;
        }

        #splash .splash-greeting {
            font-size: 2.5em;
            font-family: '8bit', cursive;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            margin-bottom: 15px;
            text-align: center;
        }

        #splash .splash-sub {
            font-size: 1.1em;
            font-family: '8bit', cursive;
            color: rgba(255,255,255,0.7);
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
            margin-bottom: 40px;
            text-align: center;
        }

        /* ===== TOMBOL "PENCET INI SAYANG" ===== */
        #splash-btn {
            padding: 22px 60px;
            font-size: 1.6em;
            font-family: '8bit', cursive;
            background: linear-gradient(135deg, #ff6b8a, #ff3d6b);
            color: white;
            border: 4px solid rgba(255, 255, 255, 0.8);
            border-radius: 60px;
            cursor: pointer;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            box-shadow: 0 6px 30px rgba(255, 107, 138, 0.5),
                        inset 0 2px 0 rgba(255,255,255,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            position: relative;
            overflow: hidden;
            letter-spacing: 2px;
        }

        #splash-btn::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #splash-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 35px rgba(255, 107, 138, 0.7);
        }

        #splash-btn:active {
            transform: scale(0.95);
        }

        #splash-btn .btn-icon {
            display: inline-block;
            animation: pulseHeart 1.5s ease-in-out infinite;
        }

        /* Sembunyikan main content saat splash masih muncul */
        #main-content {
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #main-content.show {
            opacity: 1;
        }

        /* Di Electron, splash tetap muncul (biar seragam) */
        body.electron #splash { display: flex !important; }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        @keyframes fadePulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            #splash .splash-heart { font-size: 4em; }
            #splash .splash-greeting { font-size: 2em; }
            #splash .splash-sub { font-size: 1em; margin-bottom: 30px; }
            #splash-btn { padding: 18px 45px; font-size: 1.3em; }
            #lyrics { font-size: 1.8em; padding: 20px 15px; width: 92%; min-height: 100px; border-radius: 12px; margin: 8px; }
            .cursor { width: 10px; }
        }

        @media (max-width: 480px) {
            #splash .splash-heart { font-size: 3.5em; }
            #splash .splash-greeting { font-size: 1.6em; }
            #splash .splash-sub { font-size: 0.9em; margin-bottom: 25px; }
            #splash-btn { padding: 15px 35px; font-size: 1.1em; border-width: 3px; }
            #lyrics { font-size: 1.3em; padding: 15px 12px; width: 95%; min-height: 80px; border-radius: 10px; margin: 5px; }
            .cursor { width: 8px; }
        }

        @media (max-width: 360px) {
            #splash .splash-heart { font-size: 2.8em; }
            #splash .splash-greeting { font-size: 1.3em; }
            #splash .splash-sub { font-size: 0.8em; margin-bottom: 20px; }
            #splash-btn { padding: 12px 28px; font-size: 1em; }
            #lyrics { font-size: 1em; padding: 12px 10px; min-height: 70px; }
        }

        @media (max-height: 500px) {
            #splash .splash-heart { font-size: 2.5em; margin-bottom: 5px; }
            #splash .splash-greeting { font-size: 1.2em; margin-bottom: 8px; }
            #splash .splash-sub { font-size: 0.8em; margin-bottom: 15px; }
            #splash-btn { padding: 10px 30px; font-size: 0.9em; }
            #lyrics { font-size: 1.2em; padding: 12px 15px; min-height: 60px; width: 92%; }
            body { height: 100vh; height: 100dvh; }
        }
    </style>
</head>
<body>
    <!-- Elemen Audio -->
    <audio id="bg-music" loop preload="auto">
        <source src="SDDA.mp3" type="audio/mpeg">
        <p>Browser tidak mendukung audio HTML5.</p>
    </audio>

    <!-- ===== HALAMAN PEMBUKA ===== -->
    <div id="splash">
        <div class="splash-heart">💕</div>
        <div class="splash-greeting">Hai Olinnnnnn</div>
        <div class="splash-sub">Liat ini dehhh</div>
        <button id="splash-btn">
            <span class="btn-icon">💖</span> pencet ini sayang <span class="btn-icon">💖</span>
        </button>
    </div>

    <!-- ===== KONTEN UTAMA (muncul setelah pencet tombol) ===== -->
    <div id="main-content">
        <div id="custom-title-bar">
            <div class="title">Kamu Cantik, Kamu Baik! &lt;3</div>
            <div id="window-controls">
                <button id="home-btn"><img src="assets/home.png"></button>
                <button id="max-btn"><img src="assets/maximize.png"></button>
                <button id="close-btn"><img src="assets/close.png"></button>
            </div>
        </div>

        <div id="lyrics"><span id="text"></span><span class="cursor">|</span></div>
    </div>

    <script>
        // ===== DETEKSI LINGKUNGAN =====
        const isElectron = navigator.userAgent.toLowerCase().includes('electron');
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        
        if (isElectron) {
            document.body.classList.add('electron');
            console.log('🖥️  Mode: Electron Desktop');
        } else if (isMobile) {
            console.log('📱 Mode: Mobile Browser');
        } else {
            console.log('🌐 Mode: Desktop Browser');
        }

        // 🎵 Logika Audio - Persiapan
        const audio = document.getElementById('bg-music');
        const splash = document.getElementById('splash');
        const mainContent = document.getElementById('main-content');
        const splashBtn = document.getElementById('splash-btn');
        let isPlaying = false;
        audio.volume = 0.5;

        // 🐛 Debug
        console.log('📀 Audio element:', audio);
        console.log('📀 Audio source:', audio.querySelector('source')?.src || 'Tidak ada source');

        audio.addEventListener('loadstart', () => console.log('📀 Audio: loadstart'));
        audio.addEventListener('loadeddata', () => console.log('📀 Audio: loadeddata (siap diputar)'));
        audio.addEventListener('canplay', () => console.log('📀 Audio: canplay (bisa diputar)'));
        audio.addEventListener('error', (e) => {
            const error = audio.error;
            console.error('❌ Audio ERROR:', error?.code, error?.message);
            if (error?.code === MediaError.MEDIA_ERR_SRC_NOT_SUPPORTED) {
                console.error('❌ Format audio tidak didukung atau file tidak ditemukan!');
            }
        });

        audio.load();

        // ===== FUNGSI MULAI (splash hilang, main muncul, audio play) =====
        function startApp() {
            if (isPlaying) return;
            isPlaying = true;

            // Animasi: splash fade out, main content fade in
            splash.classList.add('hidden');
            mainContent.classList.add('show');

            // Mainkan audio
            audio.play().then(() => {
                console.log('✅ Audio berhasil diputar!');
            }).catch(e => {
                console.warn('⏳ Gagal play:', e.message);
                isPlaying = false;
            });

            // Lirik langsung jalan bareng musik (tanpa delay)
            typeLine();
        }

        // ===== TOMBOL "PENCET INI SAYANG" =====
        splashBtn.addEventListener('click', startApp);
        splashBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startApp();
        }, { passive: false });

        // ===== DI ELECTRON: auto-klik setelah 1 detik =====
        if (isElectron) {
            setTimeout(startApp, 1000);
        }

        // ===== EVENT CONTROLS =====
        document.getElementById('home-btn').addEventListener('click', () => {
            location.reload();
        });
        document.getElementById('max-btn').addEventListener('click', () => {
            window.electronAPI.sendWindowControl('maximize');
        });
        document.getElementById('close-btn').addEventListener('click', () => {
            window.electronAPI.sendWindowControl('close');
        });

        const lyrics = [
            "Karena kamu cantik",
            "Kan ku beri segalanya apa yang ku punya",
            "Dan hatimu baik",
            "Sempurnalah duniaku saat kau disisiku",
            "Bukan karena make up di wajahmu",
            "Atau lipstik merah itu",
            "Lembut hati tutur kata",
            "Terciptalah cinta yang ku puja"
        ];

        const settings = [
            { delay: 1300, speed: 90 },
            { delay: 400, speed: 90 },
            { delay: 1200, speed: 115 },
            { delay: 10, speed: 110 },
            { delay: 400, speed: 90 },
            { delay: 1100, speed: 95 },
            { delay: 400, speed: 100 },
            { delay: 1000, speed: 95 }
        ];

        let index = 0;
        let charIndex = 0;
        const display = document.getElementById('text');

        function typeLine() {
            if (index >= lyrics.length) {
                display.textContent = "<3";
                return;
            }

            const line = lyrics[index];
            const config = settings[index];

            if (charIndex < line.length) {
                display.textContent += line.charAt(charIndex);
                charIndex++;
                setTimeout(typeLine, config.speed);
            } else {
                index++;
                charIndex = 0;
                setTimeout(() => {
                    display.textContent = '';
                    typeLine();
                }, config.delay);
            }
        }

        // Lirik dimulai otomatis dari startApp() setelah tombol ditekan
    </script>
</body>
</html>
